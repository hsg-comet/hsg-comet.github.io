<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>홈 화면</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .article {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }
        .article-title {
            font-weight: bold;
            font-size: 1.2em;
        }
        .delete-button {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .delete-button:hover {
            background-color: #cc0000;
        }
        h1 {
            text-align: center;
        }
        .home-button {
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .home-button:hover {
            background-color: #0056b3;
        }
        #googleLoginButtonContainer {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 300px;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h1>홈 화면</h1>
    <a href="write.html" id="writeButton" class="home-button" style="display: none;">기사 작성하기</a>
    <div id="googleLoginButtonContainer">
        <button id="googleLoginButton" class="home-button">구글 로그인</button>
    </div>
    <div id="articles-container"></div>

    <script>
        let isLoggedIn = false;

        // 구글 로그인 초기화
        function initializeGoogleLogin() {
            google.accounts.id.initialize({
                client_id: "931616178821-8gjrtu3isc3h18kqnq7b0i2p7dqdssc9.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("googleLoginButtonContainer"),
                { theme: "outline", size: "large", width: "100%" }
            );
        }

        google.accounts.id.renderButton(
    document.getElementById("googleLoginButtonContainer"),
    { theme: "outline", size: "large", width: 300 } // 픽셀 단위로 설정
);

        function handleCredentialResponse(response) {
            const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
            const existingNickname = localStorage.getItem("nickname");

            isLoggedIn = true;
            document.getElementById("writeButton").style.display = "block";

            if (!existingNickname) {
                const nickname = prompt("닉네임을 설정하세요:");
                if (nickname) {
                    localStorage.setItem("nickname", nickname);
                    alert("닉네임이 설정되었습니다. 한 번 설정한 닉네임은 변경할 수 없습니다.");
                }
            }
        }

        window.onload = function() {
            initializeGoogleLogin();
            if (localStorage.getItem("nickname")) {
                isLoggedIn = true;
                document.getElementById("writeButton").style.display = "block";
            }
            displayArticles();
        };

        function displayArticles() {
            const articlesContainer = document.getElementById('articles-container');
            const articles = JSON.parse(localStorage.getItem('articles')) || [];
            articlesContainer.innerHTML = '';
            articles.forEach((article, index) => {
                const articleElement = document.createElement('div');
                articleElement.className = 'article';

                const titleElement = document.createElement('div');
                titleElement.className = 'article-title';
                titleElement.textContent = article.title;

                const contentElement = document.createElement('div');
                contentElement.innerHTML = article.content;

                const deleteButton = document.createElement('button');
                deleteButton.className = 'delete-button';
                deleteButton.textContent = '삭제';
                deleteButton.onclick = () => deleteArticle(index);

                articleElement.appendChild(titleElement);
                articleElement.appendChild(contentElement);
                articleElement.appendChild(deleteButton);
                articlesContainer.appendChild(articleElement);
            });
        }

        function deleteArticle(index) {
            const articles = JSON.parse(localStorage.getItem('articles')) || [];
            articles.splice(index, 1);
            localStorage.setItem('articles', JSON.stringify(articles));
            displayArticles();
        }
    </script>
</body>
</html>
